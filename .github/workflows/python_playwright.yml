name: Playwright Tests

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

env:
  my_user: standard_user
  my_password: secret_sauce
  my_performance_glitched_user: performance_glitch_user

jobs:

  # ── Sharded: 8 machines in parallel ────────────────────────────────────────
  sharded:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]

    steps:
      - uses: actions/checkout@v5.0.0

      - uses: actions/setup-python@v5.3.0        # replaces setup-node
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt      # replaces npm install

      - uses: actions/setup-java@v4.7.1
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Install Playwright browsers
        run: playwright install chromium          # replaces npx playwright install

      - name: Run tests (shard ${{ matrix.shard }} of 8)
        run: pytest --shard=${{ matrix.shard }}/8   # replaces npx playwright test
        # Note: requires pytest-shard plugin → add to requirements.txt

      - name: Generate Allure report
        run: allure generate allure-assets -c --single-file

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: allure-report-shard-${{ matrix.shard }}
          path: allure-report/

  # ── Release ─────────────────────────────────────────────────────────────────
  release:
    needs: sharded
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5.0.0

      - name: Read version from pyproject.toml   # replaces package.json read
        id: pkg
        run: |
          echo "version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4.3.0
        with:
          pattern: allure-report-shard-*
          merge-multiple: false
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Test Suite v${{ steps.pkg.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## Test Suite v${{ steps.pkg.outputs.version }}

            ### What's included
            - 800 Playwright tests across 8 shards
            - Allure reports per shard attached as artifacts

            ### Run locally
            ```bash
            pytest                              # all tests
            pytest -n 4                         # 4 workers (pytest-xdist)
            pytest --shard=1/8                  # simulate one CI shard
            ```
          files: release-artifacts/**
          draft: false
          prerelease: false